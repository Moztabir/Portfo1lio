<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume • Moztabir Islam</title>
  <style>
    :root{
      --bg:#060606;
      --bg-soft:#0c0c0c;
      --panel:rgba(255,255,255,.05);
      --line:rgba(255,255,255,.12);
      --line-strong:rgba(255,255,255,.22);
      --text:#f5f5f5;
      --muted:#a8a8a8;
      --white:#ffffff;
      --radius:28px;
      --ease:cubic-bezier(.22,1,.36,1);
      --max:1300px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:"Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.08), transparent 22%),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,.06), transparent 25%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,.04), transparent 25%);
      pointer-events:none;
      z-index:-2;
    }

    .noise{
      position:fixed;
      inset:0;
      background-image:radial-gradient(rgba(255,255,255,.08) .7px, transparent .7px);
      background-size:20px 20px;
      opacity:.10;
      pointer-events:none;
      z-index:-1;
      mask-image:radial-gradient(circle at center, black 48%, transparent 96%);
    }

    .container{
      width:min(calc(100% - 36px), var(--max));
      margin:0 auto;
    }

    .mono{
      font-size:.82rem;
      text-transform:uppercase;
      letter-spacing:.16em;
    }

    .site-header{
      position:sticky;
      top:0;
      z-index:100;
      padding:14px 0;
      background:rgba(6,6,6,.65);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .nav-wrap{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 16px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(10,10,10,.65);
      box-shadow:0 14px 40px rgba(0,0,0,.25);
    }

    .brand,
    .btn{
      color:var(--text);
      text-decoration:none;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:700;
    }

    .brand-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#fff;
      box-shadow:0 0 20px rgba(255,255,255,.7);
    }

    .nav-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      transition:transform .2s var(--ease), background .2s var(--ease), border-color .2s var(--ease);
    }

    .btn:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.08);
      border-color:var(--line-strong);
    }

    .btn-primary{
      background:#fff;
      color:#070707;
    }

    .hero{
      padding:72px 0 30px;
    }

    .hero-card{
      border:1px solid var(--line);
      border-radius:36px;
      padding:36px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow:0 16px 44px rgba(0,0,0,.20);
    }

    .eyebrow{
      color:var(--muted);
      margin-bottom:14px;
    }

    h1{
      margin:0 0 18px;
      font-size:clamp(3rem, 9vw, 6.5rem);
      line-height:.88;
      letter-spacing:-.08em;
      text-transform:uppercase;
    }

    .hero-card p{
      max-width:760px;
      color:var(--muted);
      line-height:1.85;
      margin:0;
    }

    .resume-section{
      padding:0 0 80px;
    }

    .resume-frame{
      border:1px solid var(--line);
      border-radius:30px;
      overflow:hidden;
      background:rgba(255,255,255,.04);
      box-shadow:0 16px 44px rgba(0,0,0,.20);
    }

    .resume-toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:18px 20px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.03);
    }

    .resume-toolbar p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
    }

    .resume-viewer{
      width:100%;
      height:78vh;
      border:none;
      display:block;
      background:#111;
    }

    .fallback{
      padding:22px;
      color:var(--muted);
      line-height:1.8;
      border-top:1px solid var(--line);
    }

    @media (max-width: 760px){
      .hero{
        padding:46px 0 24px;
      }

      .hero-card{
        padding:24px;
        border-radius:28px;
      }

      .resume-toolbar{
        flex-direction:column;
        align-items:flex-start;
      }

      .resume-viewer{
        height:70vh;
      }

      .nav-wrap{
        flex-direction:column;
        align-items:flex-start;
      }

      .nav-actions{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <header class="site-header">
    <div class="container">
      <div class="nav-wrap">
        <a href="index.html" class="brand">
          <span class="brand-dot"></span>
          <span>Moztabir Islam</span>
        </a>

        <div class="nav-actions">
          <a href="index.html" class="btn">← Back to Portfolio</a>
          <a href="assets/files/resume.pdf" class="btn btn-primary" download>Download Resume</a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-card">
          <h1>Resume</h1>
        </div>
      </div>
    </section>

    <section class="resume-section">
      <div class="container">
        <div class="resume-frame">
          <div class="resume-toolbar">
            <div>
              <div class="mono">Resume Preview</div>
              <p>Preview may depend on browser support. Download is always available.</p>
            </div>

            <a href="assets/Resume.pdf" class="btn" download>Download PDF</a>
          </div>

          <iframe
            class="resume-viewer"
            src="assets/Resume.pdf"
            title="Resume Preview">
          </iframe>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
